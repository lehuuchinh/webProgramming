<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Quản lý sinh viên</h1>
    
    <form id="studentForm">
        <input type="hidden" id="studentIndex" value="">
        <div>
            <label for="studentId">Mã sinh viên:</label>
            <input type="text" id="studentId" required>
        </div>
        <div>
            <label for="studentName">Họ tên:</label>
            <input type="text" id="studentName" required>
        </div>
        <div>
            <label for="studentGender">Giới tính:</label>
            <select id="studentGender" required>
                <option value="Nam">Nam</option>
                <option value="Nữ">Nữ</option>
            </select>
        </div>
        <div>
            <label for="studentDob">Ngày sinh:</label>
            <input type="date" id="studentDob" required>
        </div>
        <div>
            <label for="studentHometown">Quê quán:</label>
            <input type="text" id="studentHometown" required>
        </div>
        <button type="submit">Lưu</button>
        <button type="reset" id="resetBtn">Hủy</button>
    </form>

    <h2>Danh sách sinh viên</h2>
    <table id="studentTable">
        <thead>
            <tr>
                <th>Mã sinh viên</th>
                <th>Họ tên</th>
                <th>Giới tính</th>
                <th>Ngày sinh</th>
                <th>Quê quán</th>
                <th>Hành động</th>
            </tr>
        </thead>
        <tbody>
            <!-- Dữ liệu sinh viên sẽ được hiển thị tại đây -->
        </tbody>
    </table>

    <script src="main.js"></script>
</body>
</html>
